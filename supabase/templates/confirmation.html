<h2>Confirm your sign-up</h2>
<p>Enter this 6-digit code to finish creating your account:</p>
<p style="font-size: 32px; font-weight: 700; letter-spacing: 8px; text-align: center; padding: 20px;">
  {{ .Token }}
</p>
<p>The code expires in 1 hour. If you didn't request it, you can safely ignore this email.</p>
<p>Or use this link to confirm:
  <a href="{{ .RedirectTo }}&token_hash={{ .TokenHash }}&type=signup">Confirm sign-up</a>
</p>
