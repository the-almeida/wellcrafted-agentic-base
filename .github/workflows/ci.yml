name: CI

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Check policy presence
        run: ./scripts/check-policies.sh

      - name: Check no Edge runtime
        run: ./scripts/check-no-edge.sh

      - name: Start Supabase
        run: pnpm exec supabase start

      - name: Apply migrations
        run: pnpm db:migrate

      - name: Run unit and integration tests
        run: pnpm test --run

      - name: Build
        run: pnpm build

      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps

      - name: Run e2e tests (full)
        run: pnpm e2e:full
